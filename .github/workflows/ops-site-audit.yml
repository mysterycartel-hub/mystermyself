name: OPS Site Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run OPS audit suite
        run: npm run ops:audit-all

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ops-audit-reports
          path: docs/reports/
          retention-days: 30
