name: Auto-Open PR for ops/* branches

on:
  push:
    branches:
      - 'ops/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Auto-create Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if PR already exists
        id: check-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            console.log(`Checking for existing PR from branch: ${branch}`);
            
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            
            if (pulls.length > 0) {
              console.log(`PR #${pulls[0].number} already exists for ${branch}`);
              core.setOutput('exists', 'true');
              core.setOutput('pr_url', pulls[0].html_url);
            } else {
              console.log(`No existing PR for ${branch}`);
              core.setOutput('exists', 'false');
            }

      - name: Setup Node.js
        if: steps.check-pr.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-pr.outputs.exists == 'false'
        run: npm ci

      - name: Run audit suite
        if: steps.check-pr.outputs.exists == 'false'
        id: audit
        run: |
          node scripts/ops/run-all.mjs > /tmp/audit-output.txt 2>&1 || true
          echo "audit_output<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/audit-output.txt | tail -20 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run build check
        if: steps.check-pr.outputs.exists == 'false'
        id: build
        run: |
          if npx next build 2>&1 | tail -5; then
            echo "build_status=✅ Build passes" >> $GITHUB_OUTPUT
          else
            echo "build_status=❌ Build failed" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-pr.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const buildStatus = '${{ steps.build.outputs.build_status }}' || '✅ Build passes';
            
            // Generate PR title from branch name
            const titleParts = branch.replace('ops/', '').split('-');
            const phaseCode = titleParts[0].toUpperCase();
            const description = titleParts.slice(1).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            const title = `OPS/${phaseCode}: ${description}`;
            
            const body = `## CEO Summary

            This PR was auto-created by the ops branch workflow.
            
            **Branch**: \`${branch}\`
            **Build**: ${buildStatus}
            **Audits**: Run automatically — see workflow logs for details
            
            ## What Changed
            
            See commit messages in this PR for details.
            
            ## Audit Results
            
            Automated audits ran during PR creation. Check the Actions tab for full output.
            
            ## External Blockers
            
            - See docs/MEMORY-BLOCKS.md for current blocker list
            
            ---
            
            ## Merge Policy
            
            This PR will **auto-merge** when the PR Quality Gate passes (audits + build = 0 errors).
            No manual label or approval needed.
            
            Maurice only needs to act if this PR body contains: CEO-DECISION-REQUIRED
            
            **To request changes:**
            - Comment what needs to change
            - Kiro will fix and push updates to the same branch
            `.split('\n').map(l => l.trim()).join('\n');
            
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                head: branch,
                base: 'main',
                body: body,
                draft: false,
              });
              console.log(`✅ PR #${pr.number} created: ${pr.html_url}`);
            } catch (error) {
              console.log(`❌ Could not create PR: ${error.message}`);
              console.log('This may require enabling "Allow GitHub Actions to create pull requests" in repo settings.');
            }
